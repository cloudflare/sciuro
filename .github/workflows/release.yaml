name: Release
on:
  push:
    tags:
      - "v*"
jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      REPO: docker.io/cloudflare
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: git fetch --tags --force
      - uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          repository-cache: true
      - name: Push multi-arch image
        run: |
          bazel --bazelrc=tools/ci.bazelrc run //cmd/sciuro:push -- \
            --repository=${REPO}/sciuro --tag=${GITHUB_REF_NAME}
      - name: Render manifests
        run: |
          bazel --bazelrc=tools/ci.bazelrc build //manifests:stable //manifests:cluster \
            --define repo=${REPO}
          cp bazel-bin/manifests/stable.yaml stable.yaml
          cp bazel-bin/manifests/cluster.yaml cluster.yaml
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            stable.yaml
            cluster.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
